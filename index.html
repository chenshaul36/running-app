<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Running">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a1a">
    <title>Running Program</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .header {
            background: #1a1a1a;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: calc(24px + env(safe-area-inset-top));
        }

        .app-title {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
        }

        .view-past-link {
            color: #999;
            font-size: 16px;
            text-decoration: none;
            font-weight: 400;
            cursor: pointer;
            transition: color 0.3s;
            padding: 8px;
            margin: -8px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .view-past-link:hover {
            color: #fff;
        }

        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px 40px;
        }

        .hero-section {
            position: relative;
            height: 320px;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 32px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hero-title {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .hero-meta {
            font-size: 15px;
            color: rgba(255,255,255,0.8);
            font-weight: 400;
        }

        .hero-distance {
            font-size: 68px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -2px;
            text-align: right;
        }

        .workouts-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .workout-card {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .workout-card:hover {
            background: #303030;
            transform: translateY(-2px);
        }

        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .workout-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .workout-type-badge.easy {
            background: #4a7c59;
            color: #ffffff;
        }

        .workout-type-badge.fartlek {
            background: #d97941;
            color: #ffffff;
        }

        .workout-type-badge.volume {
            background: #5a7c9c;
            color: #ffffff;
        }

        .check-icon {
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a7c59;
            font-size: 12px;
        }

        .workout-distance-badge {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .workout-title {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .workout-description {
            font-size: 15px;
            color: #999;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .workout-details {
            padding: 16px;
            background: #1a1a1a;
            border-radius: 12px;
            border-left: 3px solid #d97941;
        }

        .workout-details.easy-border {
            border-left-color: #4a7c59;
        }

        .workout-details.volume-border {
            border-left-color: #5a7c9c;
        }

        .detail-line {
            font-size: 14px;
            color: #ccc;
            line-height: 1.8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .modal-content {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            margin-top: 50px;
            margin-bottom: 50px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }

        .close-btn {
            background: #1a1a1a;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #d97941;
        }

        .cycle-section {
            margin-bottom: 28px;
        }

        .cycle-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .week-item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .week-item:hover {
            background: #303030;
        }

        .week-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .week-item-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        .week-item-distance {
            font-size: 16px;
            font-weight: 700;
            color: #d97941;
        }

        .week-item-dates {
            font-size: 13px;
            color: #999;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px 16px;
            }

            .app-title {
                font-size: 20px;
            }

            .view-past-link {
                font-size: 14px;
            }

            .main-container {
                padding: 0 16px 32px;
            }

            .hero-section {
                height: 280px;
                border-radius: 20px;
                margin-bottom: 20px;
            }

            .hero-content {
                padding: 24px;
            }

            .hero-title {
                font-size: 28px;
            }

            .hero-meta {
                font-size: 13px;
            }

            .hero-distance {
                font-size: 48px;
            }

            .workout-card {
                padding: 20px;
            }

            .workout-type-badge {
                padding: 6px 16px;
                font-size: 11px;
            }

            .workout-distance-badge {
                font-size: 18px;
            }

            .workout-title {
                font-size: 20px;
            }

            .workout-description {
                font-size: 14px;
            }

            .detail-line {
                font-size: 13px;
            }

            .modal-content {
                padding: 24px;
                margin-top: 20px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 16px;
            }

            .app-title {
                font-size: 18px;
            }

            .view-past-link {
                font-size: 13px;
            }

            .main-container {
                padding: 0 12px 24px;
            }

            .hero-section {
                height: 240px;
                border-radius: 16px;
            }

            .hero-content {
                padding: 20px;
            }

            .hero-title {
                font-size: 24px;
            }

            .hero-distance {
                font-size: 40px;
            }

            .workouts-list {
                gap: 16px;
            }

            .workout-card {
                padding: 18px;
                border-radius: 16px;
            }

            .workout-header {
                flex-wrap: wrap;
                gap: 10px;
            }

            .workout-type-badge {
                flex: 1;
            }

            .workout-distance-badge {
                font-size: 16px;
            }

            .workout-details {
                padding: 14px;
            }
        }

        @media (hover: none) {
            .workout-card:active {
                background: #303030;
                transform: scale(0.98);
            }

            .view-past-link:active {
                color: #fff;
            }

            .week-item:active {
                background: #303030;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .hero-section {
                height: 200px;
            }

            .hero-title {
                font-size: 22px;
            }

            .hero-distance {
                font-size: 36px;
            }
        }
    </style>

        function openPastWorkouts() {
